---
#
# YAMLLint / Configuration / Generic
#
# * Version: 1.0.0
# * Template: 2.0.0
#

yaml-files:
  - "*.yaml"
  - "*.yml"

ignore-from-file:
  - ".gitignore"
  - ".yamlignore-generic"

extends: default

rules:
  anchors: enable
  braces: enable
  brackets: enable
  colons: enable
  commas: enable
  comments:
    level: "warning"
    min-spaces-from-content: 1
  comments-indentation:
    level: "warning"
  document-end: disable
  document-start:
    level: "warning"
  empty-lines: enable
  empty-values: disable
  float-values: disable
  hyphens: enable
  indentation: enable
  key-duplicates: enable
  key-ordering: disable
  line-length: disable
  new-line-at-end-of-file: enable
  new-lines: enable
  octal-values: disable
  quoted-strings: disable
  trailing-spaces: enable
  truthy:
    level: "warning"

#
# Project settings
#
