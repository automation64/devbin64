---
# template-gh-test: 1.4.0
name: "Test/X_TARGET_TITLE_X"

env:
  DEV_CICD_DEBUG: ${{ vars.DEV_CICD_DEBUG || 'NONE' }}
  DEV_CICD_DEBUG_BASH: ${{ vars.DEV_CICD_DEBUG_BASH || '' }}
  BL64_LIB_CICD: ${{ vars.BL64_LIB_CICD || 'YES' }}
  DEV_TEST_BASH_RUNNER_ENVIRONMENT: ${{ vars.DEV_TEST_BASH_RUNNER_ENVIRONMENT || 'ON' }}

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "feature/**"
      - "release/**"
    paths:
      - "src/**"
      - "test/**"

jobs:
  test-X_TARGET_X:
    runs-on: "ubuntu-latest"
    steps:

      - name: "Check out repository code"
        uses: "actions/checkout@main"

      - name: "Cache base tools"
        uses: "actions/cache@v5"
        with:
          path: |
            ./lib/bl64
            ./lib/inst64
          key: "dev-tools"

      - name: "Cache module tools"
        uses: "actions/cache@v5"
        with:
          path: |
            ./lib/X_MODULE_X
          key: "dev-X_MODULE_X"

      - name: "Download tools"
        run: |
          ./bin/dev-lib-base
          # X_TOOLS_PLACEHOLDER_X

      # - name: "Prepare for testing"
      #   run: "X_PREPARE_PLACEHOLDER_X"

      - name: "Run tests"
        run: "X_PLACEHOLDER_3_X"
...
